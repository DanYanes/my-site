<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }
        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #f8cdda, #a8edea, #f8cdda);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        header p {
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0.6;
            font-weight: 300;
        }
        #last-updated {
            font-size: 0.85rem;
            opacity: 0.4;
            margin-top: 6px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 36px 30px;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
            animation: cardGlow 6s ease-in-out infinite;
        }
        @keyframes cardGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10%, 10%); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .city-name { font-size: 1.5rem; font-weight: 600; }
        .state-name { font-size: 0.85rem; opacity: 0.5; font-weight: 300; }
        .weather-icon {
            font-size: 3.2rem;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .temp-main {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }
        .temp-main .unit { font-size: 1.8rem; font-weight: 300; opacity: 0.6; }
        .condition {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            position: relative;
            z-index: 1;
        }
        .detail-item {
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        .detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.5;
            margin-bottom: 6px;
        }
        .detail-value { font-size: 1.15rem; font-weight: 600; }

        .forecast {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
            overflow-x: auto;
        }
        .forecast-day {
            flex: 1;
            min-width: 58px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            font-size: 0.75rem;
        }
        .forecast-day .day-name { opacity: 0.5; margin-bottom: 4px; }
        .forecast-day .day-icon { font-size: 1.3rem; margin: 4px 0; }
        .forecast-day .day-temps { font-weight: 600; }
        .forecast-day .day-low { opacity: 0.4; font-weight: 300; }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            opacity: 0.5;
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #a8edea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .temp-cold { color: #74b9ff; }
        .temp-cool { color: #a8edea; }
        .temp-mild { color: #ffeaa7; }
        .temp-warm { color: #fdcb6e; }
        .temp-hot { color: #e17055; }

        /* News Section */
        .section-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin: 60px 0 30px;
            background: linear-gradient(90deg, #ffeaa7, #fdcb6e, #ffeaa7);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .news-column {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
        }
        .news-column-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .news-column-sub {
            font-size: 0.8rem;
            opacity: 0.4;
            margin-bottom: 18px;
        }
        .news-item {
            display: block;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover {
            padding-left: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .news-item-title {
            font-size: 0.92rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 4px;
        }
        .news-item-meta {
            font-size: 0.72rem;
            opacity: 0.4;
        }
        .news-loading {
            text-align: center;
            padding: 30px;
            opacity: 0.4;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>
    <div class="container">
        <header>
            <h1>⛅ Weather Dashboard</h1>
            <p>St. Louis &bull; New Haven &bull; Jersey City</p>
            <div id="last-updated"></div>
        </header>
        <div class="cards" id="weather-cards">
            <div class="loading">
                <div class="loading-spinner"></div>
                Fetching weather data...
            </div>
        </div>

        <h2 class="section-title">📰 Local News</h2>
        <div class="news-grid" id="news-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                Loading headlines...
            </div>
        </div>
    </div>

    <script>
        // Animated background particles
        (function() {
            const c = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const s = Math.random() * 6 + 2;
                p.style.width = s + 'px';
                p.style.height = s + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                c.appendChild(p);
            }
        })();

        const cities = [
            { name: 'St. Louis', state: 'Missouri', lat: 38.63, lon: -90.20 },
            { name: 'New Haven', state: 'Connecticut', lat: 41.31, lon: -72.92 },
            { name: 'Jersey City', state: 'New Jersey', lat: 40.72, lon: -74.05 }
        ];

        const WMO_ICONS = {
            0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
            51:'🌦️',53:'🌦️',55:'🌧️',56:'🌨️',57:'🌨️',
            61:'🌧️',63:'🌧️',65:'🌧️',66:'🌨️',67:'🌨️',
            71:'🌨️',73:'❄️',75:'❄️',77:'❄️',
            80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',
            95:'⛈️',96:'⛈️',99:'⛈️'
        };
        const WMO_DESC = {
            0:'Clear Sky',1:'Mainly Clear',2:'Partly Cloudy',3:'Overcast',
            45:'Foggy',48:'Rime Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',
            56:'Freezing Drizzle',57:'Heavy Freezing Drizzle',
            61:'Light Rain',63:'Rain',65:'Heavy Rain',66:'Freezing Rain',67:'Heavy Freezing Rain',
            71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',
            80:'Light Showers',81:'Showers',82:'Heavy Showers',
            85:'Light Snow Showers',86:'Heavy Snow Showers',
            95:'Thunderstorm',96:'Thunderstorm w/ Hail',99:'Severe Thunderstorm'
        };
        const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        function tempClass(f) {
            if (f < 32) return 'temp-cold';
            if (f < 50) return 'temp-cool';
            if (f < 68) return 'temp-mild';
            if (f < 85) return 'temp-warm';
            return 'temp-hot';
        }

        function windDir(deg) {
            const d = ['N','NE','E','SE','S','SW','W','NW'];
            return d[Math.round(deg / 45) % 8];
        }

        async function fetchWeather(city) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}`
                + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m`
                + `&daily=weather_code,temperature_2m_max,temperature_2m_min`
                + `&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=7&timezone=auto`;
            const res = await fetch(url);
            return { city, data: await res.json() };
        }

        function renderCard({ city, data }) {
            const c = data.current, d = data.daily;
            const icon = WMO_ICONS[c.weather_code] || '🌡️';
            const desc = WMO_DESC[c.weather_code] || 'Unknown';
            const temp = Math.round(c.temperature_2m);
            const feels = Math.round(c.apparent_temperature);

            let forecast = '';
            for (let i = 1; i < 7; i++) {
                const date = new Date(d.time[i] + 'T00:00:00');
                forecast += `
                    <div class="forecast-day">
                        <div class="day-name">${DAYS[date.getDay()]}</div>
                        <div class="day-icon">${WMO_ICONS[d.weather_code[i]] || '🌡️'}</div>
                        <div class="day-temps">
                            <span class="${tempClass(d.temperature_2m_max[i])}">${Math.round(d.temperature_2m_max[i])}°</span>
                            <span class="day-low">${Math.round(d.temperature_2m_min[i])}°</span>
                        </div>
                    </div>`;
            }

            return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="city-name">${city.name}</div>
                            <div class="state-name">${city.state}</div>
                        </div>
                        <div class="weather-icon">${icon}</div>
                    </div>
                    <div class="temp-main ${tempClass(temp)}">
                        ${temp}<span class="unit">°F</span>
                    </div>
                    <div class="condition">${desc} &bull; Feels like ${feels}°F</div>
                    <div class="details">
                        <div class="detail-item">
                            <div class="detail-label">💧 Humidity</div>
                            <div class="detail-value">${c.relative_humidity_2m}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">💨 Wind</div>
                            <div class="detail-value">${Math.round(c.wind_speed_10m)} mph ${windDir(c.wind_direction_10m)}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🔺 High</div>
                            <div class="detail-value ${tempClass(d.temperature_2m_max[0])}">${Math.round(d.temperature_2m_max[0])}°F</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">🔻 Low</div>
                            <div class="detail-value ${tempClass(d.temperature_2m_min[0])}">${Math.round(d.temperature_2m_min[0])}°F</div>
                        </div>
                    </div>
                    <div class="forecast">${forecast}</div>
                </div>`;
        }

        async function init() {
            try {
                const results = await Promise.all(cities.map(fetchWeather));
                document.getElementById('weather-cards').innerHTML = results.map(renderCard).join('');
                document.getElementById('last-updated').textContent =
                    'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                document.getElementById('weather-cards').innerHTML =
                    '<div class="loading">⚠️ Could not load weather data. Please refresh.</div>';
            }
        }

        init();
        setInterval(init, 10 * 60 * 1000);

        // --- News Section ---
        const newsCities = [
            { name: 'St. Louis', state: 'Missouri', query: 'St.+Louis+Missouri' },
            { name: 'New Haven', state: 'Connecticut', query: 'New+Haven+Connecticut' },
            { name: 'Jersey City', state: 'New Jersey', query: 'Jersey+City+New+Jersey' }
        ];

        function timeAgo(dateStr) {
            const diff = Date.now() - new Date(dateStr).getTime();
            const hrs = Math.floor(diff / 3600000);
            if (hrs < 1) return 'Just now';
            if (hrs < 24) return hrs + 'h ago';
            return Math.floor(hrs / 24) + 'd ago';
        }

        async function fetchNews(city) {
            const rssUrl = encodeURIComponent(
                `https://news.google.com/rss/search?q=${city.query}&hl=en-US&gl=US&ceid=US:en`
            );
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
            const data = await res.json();
            return { city, items: (data.items || []).slice(0, 5) };
        }

        function renderNewsColumn({ city, items }) {
            if (!items.length) {
                return `<div class="news-column">
                    <div class="news-column-header">${city.name}</div>
                    <div class="news-column-sub">${city.state}</div>
                    <div class="news-loading">No headlines available</div>
                </div>`;
            }
            const rows = items.map(item => {
                const source = item.author || '';
                return `<a class="news-item" href="${item.link}" target="_blank" rel="noopener">
                    <div class="news-item-title">${item.title}</div>
                    <div class="news-item-meta">${source}${source ? ' · ' : ''}${timeAgo(item.pubDate)}</div>
                </a>`;
            }).join('');

            return `<div class="news-column">
                <div class="news-column-header">${city.name}</div>
                <div class="news-column-sub">${city.state}</div>
                ${rows}
            </div>`;
        }

        async function loadNews() {
            try {
                const results = await Promise.all(newsCities.map(fetchNews));
                document.getElementById('news-grid').innerHTML = results.map(renderNewsColumn).join('');
            } catch (e) {
                document.getElementById('news-grid').innerHTML =
                    '<div class="news-loading">⚠️ Could not load news. Please refresh.</div>';
            }
        }

        loadNews();
        setInterval(loadNews, 15 * 60 * 1000);
    </script>
</body>
</html>
